services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erdem-app
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - app_data:/app/data
    networks:
      - web-proxy

volumes:
  app_data:
    name: erdem_app_data

networks:
  web-proxy:
    external: true
